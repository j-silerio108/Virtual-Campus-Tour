<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>DePaul Virtual Campus Tour</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/pannellum/2.5.6/pannellum.css"/>
  <link rel="stylesheet" href="styles.css"/>
</head>
<body>

  <!-- Header -->
  <header>
    <div class="header-inner">
      <div class="logo">
        <span class="logo-dep">De</span><span class="logo-paul">Paul</span>
        <span class="logo-tag">Virtual Campus Tour</span>
      </div>
      <nav id="scene-nav">
        <button class="nav-btn active" data-scene="student_center">Student Center</button>
        <!-- Add more nav buttons here — just set data-scene="your_scene_id" -->
      </nav>
    </div>
  </header>

  <!-- Main Viewer -->
  <main>
    <div id="panorama"></div>
    <div id="scene-title" class="scene-title">Student Center</div>

    <!-- Info Panel — slides in from right when a hotspot is clicked -->
    <div id="info-panel" class="info-panel hidden">
      <button class="close-btn">✕</button>
      <div id="panel-content"></div>
    </div>
  </main>

  <!-- Help Finder Bar -->
  <section class="help-finder">
    <span class="help-label">I need help with:</span>
    <div class="help-buttons">
      <button data-help="money">💰 Money</button>
      <button data-help="classes">📚 Classes</button>
      <button data-help="housing">🏠 Housing</button>
      <button data-help="health">🧠 Mental Health</button>
      <button data-help="jobs">💼 Jobs</button>
    </div>
  </section>

  <!-- Help Finder Modal -->
  <div id="help-modal" class="modal hidden">
    <div class="modal-box">
      <button class="close-btn">✕</button>
      <div id="modal-content"></div>
    </div>
  </div>

  <!-- Scripts — load order:
       1. Pannellum  (external viewer library)
       2. hotspots   (registry + built-in renderers)
       3. config     (pure data — no JS dependencies)
       4. help       (HELP_DATA + HelpFinder class)
       5. tour       (InfoPanel + TourApp classes)
       6. app        (composition root — wires everything)
  -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pannellum/2.5.6/pannellum.js"></script>
  <script src="hotspots.js"></script>
  <script src="config.js"></script>
  <script src="help.js"></script>
  <script src="tour.js"></script>
  <script src="app.js"></script>

</body>
</html>
