<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>DePaul Virtual Campus Tour</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/pannellum/2.5.6/pannellum.css"
        integrity="sha512-UoT/Ca6+2kRekuB1IDZgwtDt0ZUfsweWmyNhMqhG4hpnf7sFnhrLrO0zHJr2vFp7eZEvJ3FN58dhVx+YMJMt2A=="
        crossorigin="anonymous" referrerpolicy="no-referrer"/>
  <link rel="stylesheet" href="styles.css"/>
</head>
<body>

  <!-- Header -->
  <header>
    <div class="header-inner">
      <div class="logo">
        <span class="logo-dep">De</span><span class="logo-paul">Paul</span>
        <span class="logo-tag">Virtual Campus Tour</span>
      </div>
      <nav id="scene-nav"></nav>
    </div>
  </header>

  <!-- Main Viewer -->
  <main>
    <div id="panorama"></div>
    <div id="scene-title" class="scene-title">Student Center</div>

    <!-- Info Panel — slides in from right when a hotspot is clicked -->
    <div id="info-panel" class="info-panel hidden">
      <button class="close-btn">✕</button>
      <div id="panel-content"></div>
    </div>
  </main>

  <!-- Help Finder Bar -->
  <section class="help-finder">
    <span class="help-label">I need help with:</span>
    <div class="help-buttons">
      <button data-help="money">💰 Money</button>
      <button data-help="classes">📚 Classes</button>
      <button data-help="housing">🏠 Housing</button>
      <button data-help="health">🧠 Mental Health</button>
      <button data-help="jobs">💼 Jobs</button>
    </div>
  </section>

  <!-- Help Finder Modal -->
  <div id="help-modal" class="modal hidden">
    <div class="modal-box">
      <button class="close-btn">✕</button>
      <div id="modal-content"></div>
    </div>
  </div>

  <!-- Pannellum is a non-module CDN library — must remain a regular script tag -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pannellum/2.5.6/pannellum.js"
          integrity="sha512-EmZuy6vd0ns9wP+3l1hETKq/vNGELFRuLfazPnKKBbDpgZL0sZ7qyao5KgVbGJKOWlAFPNn6G9naB/8WnKN43Q=="
          crossorigin="anonymous" referrerpolicy="no-referrer"></script>
  <!-- app.js is the single entry point; it imports everything else via ES modules -->
  <script type="module" src="app.js"></script>

</body>
</html>
